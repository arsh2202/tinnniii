<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tini Heart</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
}

canvas{
display:block;
}

</style>

</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

resize();

window.addEventListener("resize",resize);

const stars=[];

for(let i=0;i<250;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
a:Math.random()

});

}

class Particle{

constructor(x,y){

this.tx=x;
this.ty=y;

this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;

this.size=12;

this.vx=0;
this.vy=0;

}

update(){

let dx=this.tx-this.x;
let dy=this.ty-this.y;

this.vx+=dx*0.02;
this.vy+=dy*0.02;

this.vx*=0.82;
this.vy*=0.82;

this.x+=this.vx;
this.y+=this.vy;

}

draw(){

ctx.save();

ctx.shadowBlur=20;
ctx.shadowColor="#ff1493";

ctx.fillStyle="#ff2b8f";

ctx.font="bold 18px Arial";

ctx.textAlign="center";

ctx.fillText("Tini",this.x,this.y);

ctx.restore();

}

}

const particles=[];

function createHeart(){

particles.length=0;

const scale=Math.min(canvas.width,canvas.height)/35;

for(let t=0;t<Math.PI*2;t+=0.045){

const x=16*Math.pow(Math.sin(t),3);

const y=
13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t);

particles.push(

new Particle(

canvas.width/2+x*scale,

canvas.height/2-y*scale

)

);

}

}

createHeart();

)

createHeart();
// Gentle floating animation
setInterval(() => {

    const scale = Math.min(canvas.width, canvas.height) / 35;

    let i = 0;

    for (let t = 0; t < Math.PI * 2; t += 0.045) {

        const x =
            16 * Math.pow(Math.sin(t), 3);

        const y =
            13 * Math.cos(t)
            - 5 * Math.cos(2 * t)
            - 2 * Math.cos(3 * t)
            - Math.cos(4 * t);

        const p = particles[i];

        p.tx =
            canvas.width / 2 +
            x * scale +
            Math.sin(Date.now() / 500 + i) * 4;

        p.ty =
            canvas.height / 2 -
            y * scale +
            Math.cos(Date.now() / 600 + i) * 4;

        i++;

    }

}, 16);

// Rebuild on resize
window.addEventListener("resize", () => {

    resize();
    createHeart();

});

// Start animation
animate();
